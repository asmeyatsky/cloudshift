id: cloudwatch-put-metric-to-cloud-monitoring-py
name: "CloudWatch put_metric_data to Cloud Monitoring create_time_series (Python)"
description: >
  Transforms CloudWatch put_metric_data calls to Cloud Monitoring
  create_time_series. AWS CloudWatch organizes metrics by Namespace and
  MetricName, while GCP Cloud Monitoring uses metric descriptors with
  custom metric types in the format custom.googleapis.com/{metric_name}.
source_provider: aws
target_provider: gcp
source_service: cloudwatch
target_service: cloud-monitoring
language: python
construct_type: method_call
match_pattern:
  method_names:
    - "put_metric_data"
    - "boto3.client"
  text_patterns:
    - "boto3.client('cloudwatch')"
    - 'boto3.client("cloudwatch")'
    - "put_metric_data"
    - "MetricName"
    - "Namespace"
transform:
  replacement_template: |
    client = monitoring_v3.MetricServiceClient()
    series = monitoring_v3.TimeSeries()
    series.metric.type = "custom.googleapis.com/my_metric"
    series.resource.type = "global"
    point = monitoring_v3.Point()
    point.value.double_value = value
    now = time.time()
    point.interval.end_time = {"seconds": int(now)}
    series.points = [point]
    client.create_time_series(
        request={"name": f"projects/{project_id}", "time_series": [series]}
    )
  import_additions:
    - "from google.cloud import monitoring_v3"
    - "import time"
  import_removals:
    - "import boto3"
  notes: >
    CloudWatch Namespace maps to a prefix in the GCP custom metric type.
    MetricName becomes part of the metric type path. Dimensions in
    CloudWatch map to metric labels in Cloud Monitoring. The Unit field
    has no direct mapping but can be specified in the metric descriptor.
    Cloud Monitoring requires creating a MetricDescriptor before writing
    data for the first time if using custom metrics. The resource type
    should be set appropriately (e.g., gce_instance, global, etc.).
base_confidence: 0.75
tags:
  - cloudwatch
  - cloud-monitoring
  - metrics
  - python
examples:
  - input: |
      import boto3

      cloudwatch = boto3.client("cloudwatch")
      cloudwatch.put_metric_data(
          Namespace="MyApp",
          MetricData=[
              {
                  "MetricName": "RequestCount",
                  "Value": 1.0,
                  "Unit": "Count",
                  "Dimensions": [
                      {"Name": "Environment", "Value": "production"},
                  ],
              }
          ],
      )
    output: |
      from google.cloud import monitoring_v3
      import time

      client = monitoring_v3.MetricServiceClient()
      project_name = f"projects/{project_id}"

      series = monitoring_v3.TimeSeries()
      series.metric.type = "custom.googleapis.com/myapp/request_count"
      series.metric.labels["environment"] = "production"
      series.resource.type = "global"

      now = time.time()
      point = monitoring_v3.Point()
      point.value.double_value = 1.0
      point.interval.end_time = {"seconds": int(now), "nanos": int((now % 1) * 1e9)}
      series.points = [point]

      client.create_time_series(request={"name": project_name, "time_series": [series]})
