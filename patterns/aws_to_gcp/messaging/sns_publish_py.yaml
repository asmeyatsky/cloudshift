id: sns-publish-to-pubsub-publish-py
name: "SNS publish to Pub/Sub publish (Python)"
description: >
  Transforms SNS publish calls to Pub/Sub publisher.publish. Maps TopicArn
  to topic_path, Message to data, and MessageAttributes to Pub/Sub attributes.
  Both SNS and Pub/Sub are publish-subscribe systems with similar semantics.
source_provider: aws
target_provider: gcp
source_service: sns
target_service: pubsub
language: python
construct_type: method_call
match_pattern:
  imports:
    - "import boto3"
  client_names:
    - "boto3.client('sns')"
    - 'boto3.client("sns")'
  method_names:
    - "publish"
  text_patterns:
    - "TopicArn="
    - "Message="
    - "Subject="
transform:
  replacement_template: |
    from google.cloud import pubsub_v1

    publisher = pubsub_v1.PublisherClient()
    topic_path = publisher.topic_path("{{project_id}}", "{{topic_name}}")
    future = publisher.publish(
        topic_path,
        data={{message}}.encode("utf-8"),
        {{attributes}}
    )
    message_id = future.result()
  import_additions:
    - "from google.cloud import pubsub_v1"
  import_removals:
    - "import boto3"
  notes: >
    SNS and Pub/Sub are both pub-sub systems, making this a natural mapping.
    SNS Subject has no direct Pub/Sub equivalent; pass it as an attribute.
    SNS MessageAttributes map to Pub/Sub attributes (string values only).
    SNS message filtering (FilterPolicy on subscriptions) maps to Pub/Sub
    subscription filters. SNS protocol-specific delivery (email, SMS, HTTP)
    has no direct Pub/Sub equivalent; use push subscriptions for HTTP
    and integrate with other GCP services for email/SMS.
base_confidence: 0.88
tags:
  - sns
  - pubsub
  - python
  - messaging
  - method-call
  - low-complexity
examples:
  - input: |
      import boto3

      sns = boto3.client('sns')
      response = sns.publish(
          TopicArn='arn:aws:sns:us-east-1:123456789:order-events',
          Subject='OrderCreated',
          Message=json.dumps({"order_id": "12345", "total": 99.99}),
          MessageAttributes={
              'event_type': {
                  'DataType': 'String',
                  'StringValue': 'order_created'
              }
          }
      )
      message_id = response['MessageId']
    output: |
      from google.cloud import pubsub_v1

      publisher = pubsub_v1.PublisherClient()
      topic_path = publisher.topic_path("my-project", "order-events")
      future = publisher.publish(
          topic_path,
          data=json.dumps({"order_id": "12345", "total": 99.99}).encode("utf-8"),
          event_type="order_created",
          subject="OrderCreated"
      )
      message_id = future.result()
