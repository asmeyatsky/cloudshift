id: eks-cluster-to-gke-tf
name: "EKS Cluster to GKE (Terraform)"
description: >
  Transforms an aws_eks_cluster and aws_eks_node_group to
  google_container_cluster and google_container_node_pool. Maps VPC/subnet
  configuration, node instance types, autoscaling settings, and Kubernetes
  version constraints.
source_provider: aws
target_provider: gcp
source_service: eks
target_service: gke
language: hcl
construct_type: resource_block
match_pattern:
  resource_types:
    - "aws_eks_cluster"
    - "aws_eks_node_group"
  text_patterns:
    - "eks"
    - "node_group"
    - "kubernetes"
transform:
  replacement_template: |
    resource "google_container_cluster" "{{resource_name}}" {
      name     = "{{cluster_name}}"
      location = "{{region}}"

      # Use a separately managed node pool
      remove_default_node_pool = true
      initial_node_count       = 1

      min_master_version = "{{k8s_version}}"

      network    = "{{network}}"
      subnetwork = "{{subnetwork}}"

      ip_allocation_policy {
        cluster_secondary_range_name  = "pods"
        services_secondary_range_name = "services"
      }

      private_cluster_config {
        enable_private_nodes    = true
        enable_private_endpoint = false
        master_ipv4_cidr_block  = "172.16.0.0/28"
      }

      workload_identity_config {
        workload_pool = "{{project_id}}.svc.id.goog"
      }
    }

    resource "google_container_node_pool" "{{node_pool_name}}" {
      name       = "{{node_pool_name}}"
      cluster    = google_container_cluster.{{resource_name}}.id
      location   = "{{region}}"
      node_count = {{desired_size}}

      autoscaling {
        min_node_count = {{min_size}}
        max_node_count = {{max_size}}
      }

      node_config {
        machine_type = "{{machine_type}}"
        disk_size_gb = {{disk_size}}
        disk_type    = "pd-balanced"

        oauth_scopes = [
          "https://www.googleapis.com/auth/cloud-platform"
        ]

        labels = {
          {{labels}}
        }

        tags = [{{network_tags}}]
      }
    }
  import_additions: []
  import_removals: []
  notes: >
    EKS IAM roles for service accounts (IRSA) maps to GKE Workload Identity.
    EKS managed add-ons (CoreDNS, kube-proxy, vpc-cni) are built into GKE.
    EKS security groups map to GKE firewall rules and network policies.
    aws_eks_addon resources have no direct equivalent; GKE uses built-in features
    or Marketplace add-ons. Instance type mapping: m5.large -> n2-standard-2,
    m5.xlarge -> n2-standard-4, c5.xlarge -> c2-standard-4.
base_confidence: 0.70
tags:
  - eks
  - gke
  - terraform
  - compute
  - kubernetes
  - high-complexity
examples:
  - input: |
      resource "aws_eks_cluster" "main" {
        name     = "production-cluster"
        role_arn = aws_iam_role.eks_cluster.arn
        version  = "1.28"

        vpc_config {
          subnet_ids              = aws_subnet.private[*].id
          endpoint_private_access = true
          endpoint_public_access  = true
          security_group_ids      = [aws_security_group.eks.id]
        }
      }

      resource "aws_eks_node_group" "workers" {
        cluster_name    = aws_eks_cluster.main.name
        node_group_name = "workers"
        node_role_arn   = aws_iam_role.eks_node.arn
        subnet_ids      = aws_subnet.private[*].id
        instance_types  = ["m5.large"]
        disk_size       = 50

        scaling_config {
          desired_size = 3
          min_size     = 2
          max_size     = 10
        }

        labels = {
          role = "worker"
        }
      }
    output: |
      resource "google_container_cluster" "main" {
        name     = "production-cluster"
        location = "us-central1"

        remove_default_node_pool = true
        initial_node_count       = 1

        min_master_version = "1.28"

        network    = google_compute_network.main.id
        subnetwork = google_compute_subnetwork.private.id

        ip_allocation_policy {
          cluster_secondary_range_name  = "pods"
          services_secondary_range_name = "services"
        }

        private_cluster_config {
          enable_private_nodes    = true
          enable_private_endpoint = false
          master_ipv4_cidr_block  = "172.16.0.0/28"
        }

        workload_identity_config {
          workload_pool = "${var.project_id}.svc.id.goog"
        }
      }

      resource "google_container_node_pool" "workers" {
        name       = "workers"
        cluster    = google_container_cluster.main.id
        location   = "us-central1"
        node_count = 3

        autoscaling {
          min_node_count = 2
          max_node_count = 10
        }

        node_config {
          machine_type = "n2-standard-2"
          disk_size_gb = 50
          disk_type    = "pd-balanced"

          oauth_scopes = [
            "https://www.googleapis.com/auth/cloud-platform"
          ]

          labels = {
            role = "worker"
          }
        }
      }
