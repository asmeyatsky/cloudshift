id: aws-gcp-secretsmanager-client-init-ts
name: "SecretsManager Client Init to GCP Secret Manager Client Init"
description: >
  Transforms AWS Secrets Manager client initialization (new SecretsManagerClient)
  to Google Cloud Secret Manager client initialization
  (new SecretManagerServiceClient) in TypeScript.
source_provider: aws
target_provider: gcp
source_service: secrets-manager
target_service: secret-manager
language: typescript
construct_type: client_init
match_pattern:
  imports:
    - "import { SecretsManagerClient } from '@aws-sdk/client-secrets-manager'"
  client_names:
    - "new SecretsManagerClient"
  text_patterns:
    - "SecretsManagerClient"
    - "@aws-sdk/client-secrets-manager"
transform:
  replacement_template: |
    const client = new SecretManagerServiceClient();
  import_additions:
    - "import { SecretManagerServiceClient } from '@google-cloud/secret-manager'"
  import_removals:
    - "import { SecretsManagerClient } from '@aws-sdk/client-secrets-manager'"
  notes: >
    AWS SecretsManagerClient requires region and optional credentials. GCP
    SecretManagerServiceClient uses application default credentials. AWS
    references secrets by name or ARN; GCP uses resource paths in the format
    projects/PROJECT_ID/secrets/SECRET_NAME/versions/VERSION. The GCP client
    is gRPC-based while the AWS client uses HTTP.
base_confidence: 0.90
tags:
  - secrets
  - secrets-manager
  - secret-manager
  - client
  - init
  - typescript
examples:
  - input: |
      import { SecretsManagerClient } from '@aws-sdk/client-secrets-manager';

      const secretsClient = new SecretsManagerClient({
        region: 'us-east-1',
      });

      export { secretsClient };
    output: |
      import { SecretManagerServiceClient } from '@google-cloud/secret-manager';

      const secretsClient = new SecretManagerServiceClient();

      export { secretsClient };
