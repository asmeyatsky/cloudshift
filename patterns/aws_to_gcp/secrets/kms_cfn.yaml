id: kms-cfn-to-cloud-kms-tf
name: "KMS Key CloudFormation to Cloud KMS (Terraform)"
description: >
  Transforms an AWS::KMS::Key CloudFormation resource definition to
  google_kms_key_ring and google_kms_crypto_key Terraform resources.
  AWS KMS keys map to GCP Cloud KMS which requires a key ring container
  before creating individual crypto keys.
source_provider: aws
target_provider: gcp
source_service: kms
target_service: cloud-kms
language: cloudformation
construct_type: resource_block
match_pattern:
  resource_types:
    - "AWS::KMS::Key"
  text_patterns:
    - "Type: AWS::KMS::Key"
    - "KeyPolicy:"
    - "EnableKeyRotation:"
    - "KeyUsage:"
    - "Description:"
transform:
  replacement_template: |
    resource "google_kms_key_ring" "{{resource_name}}_ring" {
      name     = "{{key_ring_name}}"
      location = "{{location}}"
      project  = var.project_id
    }

    resource "google_kms_crypto_key" "{{resource_name}}" {
      name            = "{{key_name}}"
      key_ring        = google_kms_key_ring.{{resource_name}}_ring.id
      rotation_period = "{{rotation_period}}"
      purpose         = "{{purpose}}"

      version_template {
        algorithm        = "{{algorithm}}"
        protection_level = "SOFTWARE"
      }

      labels = {
        {{labels}}
      }
    }
  import_additions: []
  import_removals: []
  notes: >
    AWS KMS uses a flat key structure while GCP Cloud KMS requires a key ring
    to group keys. EnableKeyRotation maps to rotation_period (GCP minimum is
    24 hours, default recommendation is 90 days). KMS key policies map to
    Cloud KMS IAM bindings (google_kms_crypto_key_iam_member). AWS KMS
    aliases map to no direct equivalent; use labels or naming conventions.
    KeyUsage ENCRYPT_DECRYPT maps to purpose ENCRYPT_DECRYPT. SIGN_VERIFY
    maps to ASYMMETRIC_SIGN. CloudFormation intrinsic functions must be
    converted to Terraform expressions.
base_confidence: 0.72
tags:
  - kms
  - cloud-kms
  - cloudformation
  - terraform
  - security
  - encryption
  - resource-block
examples:
  - input: |
      Resources:
        DataEncryptionKey:
          Type: AWS::KMS::Key
          Properties:
            Description: Key for encrypting application data
            EnableKeyRotation: true
            KeyPolicy:
              Version: "2012-10-17"
              Statement:
                - Sid: EnableRootAccess
                  Effect: Allow
                  Principal:
                    AWS: !Sub "arn:aws:iam::${AWS::AccountId}:root"
                  Action: "kms:*"
                  Resource: "*"
                - Sid: AllowLambdaUse
                  Effect: Allow
                  Principal:
                    AWS: !GetAtt LambdaRole.Arn
                  Action:
                    - "kms:Decrypt"
                    - "kms:GenerateDataKey"
                  Resource: "*"
            Tags:
              - Key: Environment
                Value: !Ref Environment
    output: |
      resource "google_kms_key_ring" "data_encryption_key_ring" {
        name     = "${var.project_name}-keyring"
        location = "us-central1"
        project  = var.project_id
      }

      resource "google_kms_crypto_key" "data_encryption_key" {
        name            = "data-encryption-key"
        key_ring        = google_kms_key_ring.data_encryption_key_ring.id
        rotation_period = "7776000s"
        purpose         = "ENCRYPT_DECRYPT"

        version_template {
          algorithm        = "GOOGLE_SYMMETRIC_ENCRYPTION"
          protection_level = "SOFTWARE"
        }

        labels = {
          environment = var.environment
        }
      }

      resource "google_kms_crypto_key_iam_member" "data_encryption_key_lambda" {
        crypto_key_id = google_kms_crypto_key.data_encryption_key.id
        role          = "roles/cloudkms.cryptoKeyEncrypterDecrypter"
        member        = "serviceAccount:${google_service_account.lambda_role.email}"
      }
