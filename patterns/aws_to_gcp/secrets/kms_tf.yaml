id: kms-key-to-gcp-kms-tf
name: "AWS KMS Key to GCP Cloud KMS (Terraform)"
description: >
  Transforms aws_kms_key and aws_kms_alias to google_kms_key_ring and
  google_kms_crypto_key. GCP KMS has an additional key ring grouping layer
  that AWS KMS does not have.
source_provider: aws
target_provider: gcp
source_service: kms
target_service: cloud-kms
language: hcl
construct_type: resource_block
match_pattern:
  resource_types:
    - "aws_kms_key"
    - "aws_kms_alias"
  text_patterns:
    - "key_usage"
    - "customer_master_key_spec"
    - "enable_key_rotation"
    - "deletion_window_in_days"
transform:
  replacement_template: |
    resource "google_kms_key_ring" "{{ring_name}}" {
      name     = "{{key_ring_name}}"
      location = "{{location}}"
      project  = var.project_id
    }

    resource "google_kms_crypto_key" "{{resource_name}}" {
      name            = "{{key_name}}"
      key_ring        = google_kms_key_ring.{{ring_name}}.id
      rotation_period = "{{rotation_period}}"
      purpose         = "{{purpose}}"

      version_template {
        algorithm        = "{{algorithm}}"
        protection_level = "{{protection_level}}"
      }

      labels = {
        {{labels}}
      }
    }
  import_additions: []
  import_removals: []
  notes: >
    GCP KMS requires a key ring (regional grouping) which has no AWS equivalent.
    AWS key_usage mapping: ENCRYPT_DECRYPT -> purpose=ENCRYPT_DECRYPT,
    SIGN_VERIFY -> purpose=ASYMMETRIC_SIGN.
    AWS enable_key_rotation=true maps to rotation_period (e.g., "7776000s" = 90 days).
    AWS deletion_window_in_days maps to destroy_scheduled_duration on the key version.
    AWS customer_master_key_spec:
      - SYMMETRIC_DEFAULT -> GOOGLE_SYMMETRIC_ENCRYPTION
      - RSA_2048 -> RSA_SIGN_PKCS1_2048_SHA256 or RSA_DECRYPT_OAEP_2048_SHA256
    AWS KMS grants map to google_kms_crypto_key_iam_binding.
    AWS KMS key policy maps to GCP KMS IAM bindings.
base_confidence: 0.78
tags:
  - kms
  - cloud-kms
  - terraform
  - secrets
  - resource-block
  - medium-complexity
examples:
  - input: |
      resource "aws_kms_key" "main" {
        description             = "Main encryption key"
        key_usage               = "ENCRYPT_DECRYPT"
        customer_master_key_spec = "SYMMETRIC_DEFAULT"
        enable_key_rotation     = true
        deletion_window_in_days = 30

        tags = {
          Environment = "production"
        }
      }

      resource "aws_kms_alias" "main" {
        name          = "alias/main-key"
        target_key_id = aws_kms_key.main.key_id
      }
    output: |
      resource "google_kms_key_ring" "main" {
        name     = "main-keyring"
        location = "us-central1"
        project  = var.project_id
      }

      resource "google_kms_crypto_key" "main" {
        name            = "main-key"
        key_ring        = google_kms_key_ring.main.id
        rotation_period = "7776000s"
        purpose         = "ENCRYPT_DECRYPT"

        version_template {
          algorithm        = "GOOGLE_SYMMETRIC_ENCRYPTION"
          protection_level = "SOFTWARE"
        }

        labels = {
          environment = "production"
        }
      }
