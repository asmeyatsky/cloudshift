id: secretsmanager-get-to-access-secret-version-py
name: "AWS get_secret_value to GCP access_secret_version (Python)"
description: >
  Transforms Secrets Manager get_secret_value calls to Secret Manager
  access_secret_version. Maps SecretId to secret resource name and
  handles the response structure differences.
source_provider: aws
target_provider: gcp
source_service: secretsmanager
target_service: secret-manager
language: python
construct_type: method_call
match_pattern:
  method_names:
    - "get_secret_value"
  text_patterns:
    - "SecretId="
    - "SecretString"
    - "SecretBinary"
    - "VersionId"
    - "VersionStage"
transform:
  replacement_template: |
    secret_name = f"projects/{{project_id}}/secrets/{{secret_id}}/versions/latest"
    response = sm_client.access_secret_version(request={"name": secret_name})
    secret_value = response.payload.data.decode("UTF-8")
  import_additions: []
  import_removals: []
  notes: >
    AWS get_secret_value returns SecretString (for text) or SecretBinary (for binary).
    GCP access_secret_version returns payload.data as bytes, decode as needed.
    AWS VersionStage (AWSCURRENT, AWSPREVIOUS) maps to GCP version numbers
    or the "latest" alias. AWS VersionId maps to GCP version number.
    AWS Secrets Manager caches secrets client-side via caching library;
    GCP has no official caching client but you can implement your own.
base_confidence: 0.88
tags:
  - secretsmanager
  - secret-manager
  - python
  - secrets
  - method-call
  - low-complexity
examples:
  - input: |
      response = sm.get_secret_value(SecretId='prod/database/credentials')
      secret = json.loads(response['SecretString'])
      db_host = secret['host']
      db_password = secret['password']
    output: |
      secret_name = f"projects/{project_id}/secrets/prod-database-credentials/versions/latest"
      response = sm_client.access_secret_version(request={"name": secret_name})
      secret = json.loads(response.payload.data.decode("UTF-8"))
      db_host = secret["host"]
      db_password = secret["password"]
  - input: |
      response = sm.get_secret_value(
          SecretId='my-api-key',
          VersionStage='AWSCURRENT'
      )
      api_key = response['SecretString']
    output: |
      secret_name = f"projects/{project_id}/secrets/my-api-key/versions/latest"
      response = sm_client.access_secret_version(request={"name": secret_name})
      api_key = response.payload.data.decode("UTF-8")
