id: aws-gcp-secretsmanager-get-secret-ts
name: "SecretsManager GetSecretValue to GCP accessSecretVersion"
description: >
  Transforms AWS Secrets Manager GetSecretValueCommand calls to Google Cloud
  Secret Manager client.accessSecretVersion() calls in TypeScript. Maps
  AWS secret name lookups to GCP secret version access paths.
source_provider: aws
target_provider: gcp
source_service: secrets-manager
target_service: secret-manager
language: typescript
construct_type: method_call
match_pattern:
  imports:
    - "import { GetSecretValueCommand } from '@aws-sdk/client-secrets-manager'"
  client_names:
    - "new GetSecretValueCommand"
  text_patterns:
    - "GetSecretValueCommand"
    - "SecretId"
    - "SecretString"
transform:
  replacement_template: |
    const client = new SecretManagerServiceClient();
    const [version] = await client.accessSecretVersion({
      name: `projects/${projectId}/secrets/${secretName}/versions/latest`,
    });
    const secretValue = version.payload?.data?.toString();
  import_additions:
    - "import { SecretManagerServiceClient } from '@google-cloud/secret-manager'"
  import_removals:
    - "import { GetSecretValueCommand } from '@aws-sdk/client-secrets-manager'"
  notes: >
    AWS GetSecretValueCommand uses SecretId (name or ARN) and optional
    VersionId/VersionStage. GCP accessSecretVersion requires the full resource
    path including project ID, secret name, and version (or 'latest'). AWS
    returns SecretString or SecretBinary; GCP returns payload.data as a Buffer.
    AWS supports automatic rotation; GCP rotation requires Cloud Functions setup.
base_confidence: 0.85
tags:
  - secrets
  - secrets-manager
  - secret-manager
  - get
  - read
  - typescript
examples:
  - input: |
      import {
        SecretsManagerClient,
        GetSecretValueCommand,
      } from '@aws-sdk/client-secrets-manager';

      const client = new SecretsManagerClient({ region: 'us-east-1' });

      async function getSecret(secretName: string): Promise<string> {
        const command = new GetSecretValueCommand({
          SecretId: secretName,
        });
        const response = await client.send(command);
        if (!response.SecretString) {
          throw new Error('Secret is not a string value');
        }
        return response.SecretString;
      }

      async function getDatabaseConfig(): Promise<{ host: string; password: string }> {
        const secretJson = await getSecret('prod/database/credentials');
        return JSON.parse(secretJson);
      }
    output: |
      import { SecretManagerServiceClient } from '@google-cloud/secret-manager';

      const client = new SecretManagerServiceClient();

      async function getSecret(secretName: string): Promise<string> {
        const projectId = process.env.GCP_PROJECT;
        const [version] = await client.accessSecretVersion({
          name: `projects/${projectId}/secrets/${secretName}/versions/latest`,
        });
        const secretValue = version.payload?.data?.toString();
        if (!secretValue) {
          throw new Error('Secret is not a string value');
        }
        return secretValue;
      }

      async function getDatabaseConfig(): Promise<{ host: string; password: string }> {
        const secretJson = await getSecret('prod-database-credentials');
        return JSON.parse(secretJson);
      }
