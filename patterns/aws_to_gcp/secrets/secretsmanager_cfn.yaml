id: secretsmanager-cfn-to-secret-manager-tf
name: "Secrets Manager CloudFormation to Secret Manager (Terraform)"
description: >
  Transforms an AWS::SecretsManager::Secret CloudFormation resource definition
  to a google_secret_manager_secret Terraform resource. AWS Secrets Manager
  maps closely to GCP Secret Manager with similar secret storage and
  versioning capabilities.
source_provider: aws
target_provider: gcp
source_service: secretsmanager
target_service: secret-manager
language: cloudformation
construct_type: resource_block
match_pattern:
  resource_types:
    - "AWS::SecretsManager::Secret"
  text_patterns:
    - "Type: AWS::SecretsManager::Secret"
    - "SecretString:"
    - "GenerateSecretString:"
    - "KmsKeyId:"
    - "Name:"
transform:
  replacement_template: |
    resource "google_secret_manager_secret" "{{resource_name}}" {
      secret_id = "{{secret_id}}"
      project   = var.project_id

      replication {
        auto {}
      }

      labels = {
        {{labels}}
      }
    }

    resource "google_secret_manager_secret_version" "{{resource_name}}_version" {
      secret      = google_secret_manager_secret.{{resource_name}}.id
      secret_data = {{secret_value}}
    }

    resource "google_secret_manager_secret_iam_member" "{{resource_name}}_access" {
      secret_id = google_secret_manager_secret.{{resource_name}}.secret_id
      project   = var.project_id
      role      = "roles/secretmanager.secretAccessor"
      member    = "serviceAccount:${google_service_account.{{sa_name}}.email}"
    }
  import_additions: []
  import_removals: []
  notes: >
    AWS Secrets Manager and GCP Secret Manager have strong feature parity.
    Automatic rotation in AWS maps to Cloud Functions triggered by Pub/Sub
    for rotation in GCP. GenerateSecretString has no direct equivalent;
    use the random provider in Terraform. KmsKeyId maps to
    customer_managed_encryption on the secret. Resource policies map to
    google_secret_manager_secret_iam_member. SecretString maps to
    google_secret_manager_secret_version secret_data. CloudFormation
    intrinsic functions must be converted to Terraform expressions.
base_confidence: 0.78
tags:
  - secretsmanager
  - secret-manager
  - cloudformation
  - terraform
  - security
  - secrets
  - resource-block
examples:
  - input: |
      Resources:
        AppSecret:
          Type: AWS::SecretsManager::Secret
          Properties:
            Name: !Sub "${AWS::StackName}/app-secret"
            Description: Application database credentials
            GenerateSecretString:
              SecretStringTemplate: '{"username": "admin"}'
              GenerateStringKey: "password"
              PasswordLength: 32
              ExcludeCharacters: '"@/\'
            KmsKeyId: !Ref EncryptionKey
            Tags:
              - Key: Environment
                Value: !Ref Environment
    output: |
      resource "random_password" "app_secret_password" {
        length           = 32
        special          = true
        override_special = "!#$%&*()-_=+[]{}|:,.<>?"
      }

      resource "google_secret_manager_secret" "app_secret" {
        secret_id = "${var.project_name}-app-secret"
        project   = var.project_id

        replication {
          auto {
            customer_managed_encryption {
              kms_key_name = google_kms_crypto_key.encryption_key.id
            }
          }
        }

        labels = {
          environment = var.environment
        }
      }

      resource "google_secret_manager_secret_version" "app_secret_version" {
        secret      = google_secret_manager_secret.app_secret.id
        secret_data = jsonencode({
          username = "admin"
          password = random_password.app_secret_password.result
        })
      }
