id: secretsmanager-client-to-secret-manager-py
name: "AWS Secrets Manager Client to GCP Secret Manager (Python)"
description: >
  Transforms boto3 Secrets Manager client initialization to
  google.cloud.secretmanager SecretManagerServiceClient.
source_provider: aws
target_provider: gcp
source_service: secretsmanager
target_service: secret-manager
language: python
construct_type: client_init
match_pattern:
  imports:
    - "import boto3"
  client_names:
    - "boto3.client('secretsmanager')"
    - 'boto3.client("secretsmanager")'
  text_patterns:
    - "secretsmanager"
    - "SecretId"
transform:
  replacement_template: |
    from google.cloud import secretmanager

    sm_client = secretmanager.SecretManagerServiceClient()
  import_additions:
    - "from google.cloud import secretmanager"
  import_removals:
    - "import boto3"
  notes: >
    AWS Secrets Manager supports automatic rotation via Lambda; GCP Secret Manager
    supports rotation via Pub/Sub notifications + Cloud Functions.
    AWS secret ARNs map to GCP secret resource names
    (projects/PROJECT_ID/secrets/SECRET_NAME/versions/VERSION).
    Both services support versioning of secret values.
base_confidence: 0.90
tags:
  - secretsmanager
  - secret-manager
  - python
  - secrets
  - client-init
  - low-complexity
examples:
  - input: |
      import boto3

      sm = boto3.client('secretsmanager', region_name='us-east-1')
    output: |
      from google.cloud import secretmanager

      sm_client = secretmanager.SecretManagerServiceClient()
