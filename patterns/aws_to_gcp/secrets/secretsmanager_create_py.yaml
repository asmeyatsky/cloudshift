id: secretsmanager-create-to-secret-manager-create-py
name: "Secrets Manager create_secret to Secret Manager create_secret + add_secret_version (Python)"
description: >
  Transforms AWS Secrets Manager create_secret calls to Google Cloud
  Secret Manager create_secret followed by add_secret_version. AWS
  create_secret sets both the secret metadata and its initial value in
  one call, while GCP separates secret creation from version creation.
source_provider: aws
target_provider: gcp
source_service: secretsmanager
target_service: secret-manager
language: python
construct_type: method_call
match_pattern:
  method_names:
    - "create_secret"
  text_patterns:
    - "create_secret"
    - "Name="
    - "SecretString="
transform:
  replacement_template: |
    client = secretmanager.SecretManagerServiceClient()
    parent = f"projects/{project_id}"
    secret = client.create_secret(
        request={"parent": parent, "secret_id": secret_id, "secret": {"replication": {"automatic": {}}}}
    )
    client.add_secret_version(
        request={"parent": secret.name, "payload": {"data": secret_value.encode("utf-8")}}
    )
  import_additions:
    - "from google.cloud import secretmanager"
  import_removals:
    - "import boto3"
  notes: >
    AWS Secrets Manager create_secret combines metadata creation and the
    initial secret value in a single call. GCP Secret Manager requires two
    steps: create_secret (creates the secret resource with replication
    policy) and add_secret_version (adds the actual secret data). The
    replication policy must be specified during creation (automatic or
    user-managed). Tags in AWS map to labels in GCP.
base_confidence: 0.82
tags:
  - secretsmanager
  - secret-manager
  - create
  - python
examples:
  - input: |
      import boto3

      client = boto3.client("secretsmanager")
      response = client.create_secret(
          Name="my-app/database-password",
          SecretString="super-secret-password",
          Description="Database password for my-app",
          Tags=[{"Key": "Environment", "Value": "production"}],
      )
    output: |
      from google.cloud import secretmanager

      client = secretmanager.SecretManagerServiceClient()
      parent = f"projects/{project_id}"
      secret = client.create_secret(
          request={
              "parent": parent,
              "secret_id": "my-app-database-password",
              "secret": {
                  "replication": {"automatic": {}},
                  "labels": {"environment": "production"},
              },
          }
      )
      client.add_secret_version(
          request={
              "parent": secret.name,
              "payload": {"data": "super-secret-password".encode("utf-8")},
          }
      )
