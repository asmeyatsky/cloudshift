id: secretsmanager-secret-to-gcp-secret-tf
name: "AWS Secrets Manager to GCP Secret Manager (Terraform)"
description: >
  Transforms aws_secretsmanager_secret and aws_secretsmanager_secret_version
  to google_secret_manager_secret and google_secret_manager_secret_version.
source_provider: aws
target_provider: gcp
source_service: secretsmanager
target_service: secret-manager
language: hcl
construct_type: resource_block
match_pattern:
  resource_types:
    - "aws_secretsmanager_secret"
    - "aws_secretsmanager_secret_version"
  text_patterns:
    - "secret_string"
    - "recovery_window_in_days"
    - "kms_key_id"
transform:
  replacement_template: |
    resource "google_secret_manager_secret" "{{resource_name}}" {
      secret_id = "{{secret_id}}"
      project   = var.project_id

      replication {
        auto {}
      }

      labels = {
        {{labels}}
      }
    }

    resource "google_secret_manager_secret_version" "{{resource_name}}" {
      secret      = google_secret_manager_secret.{{resource_name}}.id
      secret_data = {{secret_data}}
    }
  import_additions: []
  import_removals: []
  notes: >
    AWS recovery_window_in_days (soft delete) has no direct GCP equivalent;
    GCP Secret Manager deletes immediately but supports version management.
    AWS KMS encryption maps to GCP CMEK via customer_managed_encryption.
    AWS secret rotation (rotation_lambda_arn) maps to GCP rotation via
    Pub/Sub topic notifications + Cloud Functions.
    AWS secret policy (resource-based) maps to google_secret_manager_secret_iam_binding.
    Secret names in GCP cannot contain '/' — replace with '-'.
base_confidence: 0.88
tags:
  - secretsmanager
  - secret-manager
  - terraform
  - secrets
  - resource-block
  - low-complexity
examples:
  - input: |
      resource "aws_secretsmanager_secret" "db_creds" {
        name                    = "prod/database/credentials"
        description             = "Production database credentials"
        recovery_window_in_days = 7
        kms_key_id              = aws_kms_key.secrets.arn

        tags = {
          Environment = "production"
        }
      }

      resource "aws_secretsmanager_secret_version" "db_creds" {
        secret_id = aws_secretsmanager_secret.db_creds.id
        secret_string = jsonencode({
          host     = "db.example.com"
          port     = 5432
          username = "admin"
          password = var.db_password
        })
      }
    output: |
      resource "google_secret_manager_secret" "db_creds" {
        secret_id = "prod-database-credentials"
        project   = var.project_id

        replication {
          auto {}
        }

        labels = {
          environment = "production"
        }
      }

      resource "google_secret_manager_secret_version" "db_creds" {
        secret = google_secret_manager_secret.db_creds.id
        secret_data = jsonencode({
          host     = "db.example.com"
          port     = 5432
          username = "admin"
          password = var.db_password
        })
      }
