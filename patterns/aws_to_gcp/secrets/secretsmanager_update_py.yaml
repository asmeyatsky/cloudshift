id: secretsmanager-update-to-secret-manager-version-py
name: "Secrets Manager update_secret to Secret Manager add_secret_version (Python)"
description: >
  Transforms AWS Secrets Manager update_secret calls to Google Cloud
  Secret Manager add_secret_version. AWS update_secret modifies the
  secret value in place, while GCP creates a new immutable version of
  the secret, preserving the version history.
source_provider: aws
target_provider: gcp
source_service: secretsmanager
target_service: secret-manager
language: python
construct_type: method_call
match_pattern:
  method_names:
    - "update_secret"
  text_patterns:
    - "update_secret"
    - "SecretId="
    - "SecretString="
transform:
  replacement_template: |
    client = secretmanager.SecretManagerServiceClient()
    parent = f"projects/{project_id}/secrets/{secret_id}"
    client.add_secret_version(
        request={"parent": parent, "payload": {"data": new_value.encode("utf-8")}}
    )
  import_additions:
    - "from google.cloud import secretmanager"
  import_removals:
    - "import boto3"
  notes: >
    AWS update_secret replaces the current secret value and can also
    update metadata. GCP add_secret_version creates a new version while
    retaining previous versions. To update metadata (description, labels)
    in GCP, use update_secret separately. Old versions in GCP can be
    disabled or destroyed explicitly. The latest version is always
    accessible via the "latest" alias.
base_confidence: 0.82
tags:
  - secretsmanager
  - secret-manager
  - update
  - version
  - python
examples:
  - input: |
      import boto3

      client = boto3.client("secretsmanager")
      client.update_secret(
          SecretId="my-app/database-password",
          SecretString="new-super-secret-password",
      )
    output: |
      from google.cloud import secretmanager

      client = secretmanager.SecretManagerServiceClient()
      parent = f"projects/{project_id}/secrets/my-app-database-password"
      response = client.add_secret_version(
          request={
              "parent": parent,
              "payload": {"data": "new-super-secret-password".encode("utf-8")},
          }
      )
  - input: |
      import boto3
      import json

      sm = boto3.client("secretsmanager")
      sm.update_secret(
          SecretId=secret_arn,
          SecretString=json.dumps({"username": "admin", "password": "new-pass"}),
          Description="Updated database credentials",
      )
    output: |
      from google.cloud import secretmanager
      import json

      client = secretmanager.SecretManagerServiceClient()
      parent = client.secret_path(project_id, secret_id)
      # Update the secret value by adding a new version
      client.add_secret_version(
          request={
              "parent": parent,
              "payload": {
                  "data": json.dumps({"username": "admin", "password": "new-pass"}).encode("utf-8")
              },
          }
      )
      # Update metadata (description) separately if needed
      client.update_secret(
          request={
              "secret": {
                  "name": parent,
                  "labels": {"description": "updated-database-credentials"},
              },
              "update_mask": {"paths": ["labels"]},
          }
      )
