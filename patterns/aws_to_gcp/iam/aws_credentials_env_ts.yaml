id: aws-gcp-credentials-env-ts
name: "AWS Environment Variables to GCP Environment Variables"
description: >
  Transforms AWS credential and configuration environment variable references
  (AWS_REGION, AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY) to GCP equivalents
  (GCP_PROJECT, GOOGLE_APPLICATION_CREDENTIALS) in TypeScript code.
source_provider: aws
target_provider: gcp
source_service: iam
target_service: iam
language: typescript
construct_type: import_statement
match_pattern:
  imports: []
  client_names: []
  text_patterns:
    - "AWS_REGION"
    - "AWS_ACCESS_KEY_ID"
    - "AWS_SECRET_ACCESS_KEY"
    - "AWS_SESSION_TOKEN"
    - "AWS_DEFAULT_REGION"
    - "process.env.AWS_"
transform:
  replacement_template: |
    // GCP uses application default credentials (ADC)
    // Set GOOGLE_APPLICATION_CREDENTIALS to the path of the service account key file
    // Set GCP_PROJECT or GCLOUD_PROJECT for the project ID
    const projectId = process.env.GCP_PROJECT;
  import_additions: []
  import_removals: []
  notes: >
    AWS uses explicit credential environment variables (AWS_ACCESS_KEY_ID,
    AWS_SECRET_ACCESS_KEY, AWS_SESSION_TOKEN) and region (AWS_REGION). GCP
    uses Application Default Credentials (ADC), which can be configured via
    GOOGLE_APPLICATION_CREDENTIALS environment variable pointing to a service
    account key file, or automatically via metadata server on GCP infrastructure.
    GCP_PROJECT or GCLOUD_PROJECT provides the project ID. Region-specific
    configuration is typically done per-service in GCP rather than globally.
base_confidence: 0.85
tags:
  - iam
  - credentials
  - environment
  - configuration
  - typescript
examples:
  - input: |
      const config = {
        region: process.env.AWS_REGION || 'us-east-1',
        credentials: {
          accessKeyId: process.env.AWS_ACCESS_KEY_ID!,
          secretAccessKey: process.env.AWS_SECRET_ACCESS_KEY!,
          sessionToken: process.env.AWS_SESSION_TOKEN,
        },
      };

      function getRegion(): string {
        return process.env.AWS_REGION || process.env.AWS_DEFAULT_REGION || 'us-east-1';
      }

      function validateCredentials(): void {
        if (!process.env.AWS_ACCESS_KEY_ID) {
          throw new Error('AWS_ACCESS_KEY_ID is required');
        }
        if (!process.env.AWS_SECRET_ACCESS_KEY) {
          throw new Error('AWS_SECRET_ACCESS_KEY is required');
        }
      }

      export { config, getRegion, validateCredentials };
    output: |
      // GCP uses Application Default Credentials (ADC)
      // Set GOOGLE_APPLICATION_CREDENTIALS env var to service account key file path
      // or use default credentials on GCP infrastructure
      const config = {
        projectId: process.env.GCP_PROJECT || process.env.GCLOUD_PROJECT,
        // credentials are loaded automatically via ADC
      };

      function getProjectId(): string {
        return process.env.GCP_PROJECT || process.env.GCLOUD_PROJECT || '';
      }

      function validateCredentials(): void {
        if (!process.env.GCP_PROJECT && !process.env.GCLOUD_PROJECT) {
          throw new Error('GCP_PROJECT is required');
        }
        // GOOGLE_APPLICATION_CREDENTIALS is optional when running on GCP infrastructure
        // as metadata server provides credentials automatically
      }

      export { config, getProjectId, validateCredentials };
