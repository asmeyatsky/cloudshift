id: aws-credentials-env-to-gcp-env-py
name: "AWS Credential Environment Variables to GCP (Python)"
description: >
  Transforms AWS credential environment variable patterns
  (AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY, AWS_DEFAULT_REGION) to
  GCP equivalents (GOOGLE_APPLICATION_CREDENTIALS, GOOGLE_CLOUD_PROJECT).
  Also covers explicit credential construction in code.
source_provider: aws
target_provider: gcp
source_service: iam
target_service: iam
language: python
construct_type: env_var
match_pattern:
  text_patterns:
    - "AWS_ACCESS_KEY_ID"
    - "AWS_SECRET_ACCESS_KEY"
    - "AWS_SESSION_TOKEN"
    - "AWS_DEFAULT_REGION"
    - "AWS_REGION"
    - "aws_access_key_id"
    - "aws_secret_access_key"
  imports:
    - "import os"
    - "import boto3"
transform:
  replacement_template: |
    import google.auth
    from google.auth import default

    # GCP uses Application Default Credentials (ADC)
    # Set GOOGLE_APPLICATION_CREDENTIALS env var to service account key file path
    # Or use: gcloud auth application-default login (for local development)

    credentials, project = google.auth.default()
  import_additions:
    - "import google.auth"
  import_removals:
    - "import boto3"
  notes: >
    AWS uses access key pairs (key ID + secret); GCP uses service account
    key files or Application Default Credentials (ADC).
    Environment variable mapping:
      - AWS_ACCESS_KEY_ID -> (no equivalent, use ADC)
      - AWS_SECRET_ACCESS_KEY -> (no equivalent, use ADC)
      - AWS_DEFAULT_REGION -> GOOGLE_CLOUD_PROJECT + client location params
      - AWS_SESSION_TOKEN -> (handled by ADC for temporary credentials)
    For production, prefer Workload Identity (GKE) or attached service accounts
    over key files. Never hardcode credentials in source code.
base_confidence: 0.78
tags:
  - iam
  - credentials
  - python
  - security
  - env-config
  - medium-complexity
examples:
  - input: |
      import os
      import boto3

      session = boto3.Session(
          aws_access_key_id=os.environ['AWS_ACCESS_KEY_ID'],
          aws_secret_access_key=os.environ['AWS_SECRET_ACCESS_KEY'],
          region_name=os.environ.get('AWS_DEFAULT_REGION', 'us-east-1')
      )
      s3 = session.client('s3')
    output: |
      import os
      from google.cloud import storage

      # Uses Application Default Credentials automatically
      # Set GOOGLE_APPLICATION_CREDENTIALS=/path/to/key.json if needed
      storage_client = storage.Client(
          project=os.environ.get("GOOGLE_CLOUD_PROJECT")
      )
  - input: |
      import boto3

      client = boto3.client(
          's3',
          aws_access_key_id='AKIAIOSFODNN7EXAMPLE',
          aws_secret_access_key='wJalrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY'
      )
    output: |
      from google.cloud import storage

      # WARNING: Hardcoded credentials detected. Use ADC or GOOGLE_APPLICATION_CREDENTIALS instead.
      # See: https://cloud.google.com/docs/authentication/application-default-credentials
      storage_client = storage.Client()
