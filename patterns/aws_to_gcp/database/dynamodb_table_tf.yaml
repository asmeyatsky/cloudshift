id: dynamodb-table-to-firestore-tf
name: "DynamoDB Table to Firestore Database (Terraform)"
description: >
  Transforms aws_dynamodb_table to google_firestore_database and
  google_firestore_index resources. Maps hash/range key definitions to
  Firestore indexes, and provisioned capacity settings are dropped
  (Firestore auto-scales).
source_provider: aws
target_provider: gcp
source_service: dynamodb
target_service: firestore
language: hcl
construct_type: resource_block
match_pattern:
  resource_types:
    - "aws_dynamodb_table"
  text_patterns:
    - "hash_key"
    - "range_key"
    - "attribute"
    - "billing_mode"
transform:
  replacement_template: |
    resource "google_firestore_database" "{{resource_name}}" {
      project     = var.project_id
      name        = "{{database_name}}"
      location_id = "{{location}}"
      type        = "FIRESTORE_NATIVE"

      concurrency_mode            = "OPTIMISTIC"
      app_engine_integration_mode = "DISABLED"
    }

    resource "google_firestore_index" "{{index_name}}" {
      project    = var.project_id
      database   = google_firestore_database.{{resource_name}}.name
      collection = "{{collection_name}}"

      fields {
        field_path = "{{field_1}}"
        order      = "ASCENDING"
      }

      fields {
        field_path = "{{field_2}}"
        order      = "ASCENDING"
      }
    }
  import_additions: []
  import_removals: []
  notes: >
    DynamoDB tables with only a hash key map to Firestore collections where
    the hash key value is the document ID. Tables with hash+range keys require
    either composite document IDs or subcollections.
    DynamoDB GSIs map to Firestore composite indexes. LSIs have no equivalent
    (Firestore always indexes all fields by default for single-field queries).
    DynamoDB billing_mode PAY_PER_REQUEST is closest to Firestore's default model.
    DynamoDB Streams map to Firestore real-time listeners or Firestore triggers.
    TTL (time_to_live) maps to Firestore TTL policies.
base_confidence: 0.68
tags:
  - dynamodb
  - firestore
  - terraform
  - database
  - resource-block
  - high-complexity
examples:
  - input: |
      resource "aws_dynamodb_table" "users" {
        name         = "users"
        billing_mode = "PAY_PER_REQUEST"
        hash_key     = "user_id"
        range_key    = "created_at"

        attribute {
          name = "user_id"
          type = "S"
        }

        attribute {
          name = "created_at"
          type = "N"
        }

        attribute {
          name = "email"
          type = "S"
        }

        global_secondary_index {
          name            = "email-index"
          hash_key        = "email"
          projection_type = "ALL"
        }

        ttl {
          attribute_name = "expires_at"
          enabled        = true
        }

        tags = {
          Environment = "production"
        }
      }
    output: |
      resource "google_firestore_database" "users" {
        project     = var.project_id
        name        = "(default)"
        location_id = "us-central"
        type        = "FIRESTORE_NATIVE"

        concurrency_mode            = "OPTIMISTIC"
        app_engine_integration_mode = "DISABLED"
      }

      resource "google_firestore_index" "users_email" {
        project    = var.project_id
        database   = google_firestore_database.users.name
        collection = "users"

        fields {
          field_path = "email"
          order      = "ASCENDING"
        }

        fields {
          field_path = "created_at"
          order      = "ASCENDING"
        }
      }

      resource "google_firestore_field" "users_ttl" {
        project    = var.project_id
        database   = google_firestore_database.users.name
        collection = "users"
        field      = "expires_at"

        ttl_config {}
      }
