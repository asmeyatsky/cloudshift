id: aws-alb-to-gcp-load-balancer-tf
name: "AWS ALB to GCP HTTP(S) Load Balancer (Terraform)"
description: >
  Transforms aws_lb (Application Load Balancer), aws_lb_target_group, and
  aws_lb_listener to google_compute_backend_service, google_compute_url_map,
  google_compute_target_http_proxy, and google_compute_global_forwarding_rule.
  AWS ALB is a multi-component resource in GCP requiring several linked resources.
source_provider: aws
target_provider: gcp
source_service: alb
target_service: compute-load-balancer
language: hcl
construct_type: resource_block
match_pattern:
  resource_types:
    - "aws_lb"
    - "aws_alb"
    - "aws_lb_target_group"
    - "aws_alb_target_group"
    - "aws_lb_listener"
    - "aws_alb_listener"
    - "aws_lb_listener_rule"
  text_patterns:
    - "load_balancer_type"
    - "target_group"
    - "listener"
    - "health_check"
    - "forward"
transform:
  replacement_template: |
    resource "google_compute_health_check" "{{resource_name}}" {
      name    = "{{health_check_name}}"
      project = var.project_id

      http_health_check {
        port         = {{health_check_port}}
        request_path = "{{health_check_path}}"
      }

      check_interval_sec  = {{check_interval}}
      timeout_sec         = {{timeout}}
      healthy_threshold   = {{healthy_threshold}}
      unhealthy_threshold = {{unhealthy_threshold}}
    }

    resource "google_compute_backend_service" "{{resource_name}}" {
      name                  = "{{backend_service_name}}"
      project               = var.project_id
      protocol              = "HTTP"
      port_name             = "http"
      load_balancing_scheme = "EXTERNAL"
      timeout_sec           = 30

      health_checks = [google_compute_health_check.{{resource_name}}.id]

      backend {
        group           = google_compute_instance_group_manager.{{group_name}}.instance_group
        balancing_mode  = "UTILIZATION"
        capacity_scaler = 1.0
      }
    }

    resource "google_compute_url_map" "{{resource_name}}" {
      name            = "{{url_map_name}}"
      project         = var.project_id
      default_service = google_compute_backend_service.{{resource_name}}.id
    }

    resource "google_compute_target_http_proxy" "{{resource_name}}" {
      name    = "{{proxy_name}}"
      project = var.project_id
      url_map = google_compute_url_map.{{resource_name}}.id
    }

    resource "google_compute_global_forwarding_rule" "{{resource_name}}" {
      name       = "{{forwarding_rule_name}}"
      project    = var.project_id
      target     = google_compute_target_http_proxy.{{resource_name}}.id
      port_range = "80"
    }
  import_additions: []
  import_removals: []
  notes: >
    AWS ALB is a single resource that maps to multiple GCP resources:
      - aws_lb -> google_compute_global_forwarding_rule (entry point)
      - aws_lb_target_group -> google_compute_backend_service + google_compute_health_check
      - aws_lb_listener -> google_compute_target_http_proxy + google_compute_url_map
      - aws_lb_listener_rule -> path/host rules in google_compute_url_map
    For HTTPS listeners, use google_compute_target_https_proxy with
    google_compute_managed_ssl_certificate instead.
    AWS ALB internal maps to load_balancing_scheme=INTERNAL_MANAGED.
    AWS NLB (network) maps to google_compute_region_backend_service with TCP protocol.
    Sticky sessions (stickiness block) map to session_affinity in backend_service.
    This is a high-complexity transformation due to the many interlinked resources.
base_confidence: 0.72
tags:
  - alb
  - load-balancer
  - terraform
  - networking
  - resource-block
  - high-complexity
examples:
  - input: |
      resource "aws_lb" "web" {
        name               = "web-alb"
        internal           = false
        load_balancer_type = "application"
        security_groups    = [aws_security_group.alb.id]
        subnets            = aws_subnet.public[*].id

        tags = {
          Environment = "production"
        }
      }

      resource "aws_lb_target_group" "web" {
        name     = "web-tg"
        port     = 80
        protocol = "HTTP"
        vpc_id   = aws_vpc.main.id

        health_check {
          path                = "/health"
          port                = "traffic-port"
          healthy_threshold   = 3
          unhealthy_threshold = 3
          timeout             = 5
          interval            = 30
        }
      }

      resource "aws_lb_listener" "web" {
        load_balancer_arn = aws_lb.web.arn
        port              = 80
        protocol          = "HTTP"

        default_action {
          type             = "forward"
          target_group_arn = aws_lb_target_group.web.arn
        }
      }
    output: |
      resource "google_compute_health_check" "web" {
        name    = "web-health-check"
        project = var.project_id

        http_health_check {
          port         = 80
          request_path = "/health"
        }

        check_interval_sec  = 30
        timeout_sec         = 5
        healthy_threshold   = 3
        unhealthy_threshold = 3
      }

      resource "google_compute_backend_service" "web" {
        name                  = "web-backend"
        project               = var.project_id
        protocol              = "HTTP"
        port_name             = "http"
        load_balancing_scheme = "EXTERNAL"
        timeout_sec           = 30

        health_checks = [google_compute_health_check.web.id]
      }

      resource "google_compute_url_map" "web" {
        name            = "web-url-map"
        project         = var.project_id
        default_service = google_compute_backend_service.web.id
      }

      resource "google_compute_target_http_proxy" "web" {
        name    = "web-http-proxy"
        project = var.project_id
        url_map = google_compute_url_map.web.id
      }

      resource "google_compute_global_forwarding_rule" "web" {
        name       = "web-forwarding-rule"
        project    = var.project_id
        target     = google_compute_target_http_proxy.web.id
        port_range = "80"
      }
