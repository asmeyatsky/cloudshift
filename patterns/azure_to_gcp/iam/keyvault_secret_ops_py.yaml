id: azure-keyvault-secret-ops-to-secret-manager-py
name: "Azure Key Vault Secret Operations to GCP Secret Manager (Python)"
description: >
  Transforms Azure Key Vault SecretClient get_secret, set_secret, and
  delete_secret operations to GCP Secret Manager SecretManagerServiceClient
  access_secret_version, create_secret/add_secret_version, and delete_secret.
source_provider: azure
target_provider: gcp
source_service: key-vault
target_service: secret-manager
language: python
construct_type: method_call
match_pattern:
  imports:
    - "from azure.keyvault.secrets import SecretClient"
    - "from azure.identity import DefaultAzureCredential"
  method_names:
    - "get_secret"
    - "set_secret"
    - "delete_secret"
  text_patterns:
    - "SecretClient"
    - "get_secret"
    - "set_secret"
    - "delete_secret"
    - "vault_url"
    - ".value"
transform:
  replacement_template: |
    from google.cloud import secretmanager

    sm_client = secretmanager.SecretManagerServiceClient()
    project_id = "{{project_id}}"

    # Access secret (get_secret)
    name = f"projects/{project_id}/secrets/{{secret_id}}/versions/latest"
    response = sm_client.access_secret_version(request={"name": name})
    secret_value = response.payload.data.decode("UTF-8")

    # Create/update secret (set_secret)
    parent = f"projects/{project_id}"
    try:
        sm_client.create_secret(request={
            "parent": parent,
            "secret_id": "{{secret_id}}",
            "secret": {"replication": {"automatic": {}}},
        })
    except Exception:
        pass
    sm_client.add_secret_version(request={
        "parent": f"{parent}/secrets/{{secret_id}}",
        "payload": {"data": b"{{secret_value}}"},
    })

    # Delete secret (delete_secret)
    sm_client.delete_secret(request={
        "name": f"projects/{project_id}/secrets/{{secret_id}}"
    })
  import_additions:
    - "from google.cloud import secretmanager"
  import_removals:
    - "from azure.keyvault.secrets import SecretClient"
    - "from azure.identity import DefaultAzureCredential"
  notes: >
    Key Vault get_secret(name).value maps to
    access_secret_version(name/versions/latest).payload.data.decode().
    Key Vault set_secret(name, value) maps to create_secret + add_secret_version
    (two-step process in GCP: create the secret resource, then add a version).
    Key Vault delete_secret(name) maps to delete_secret (immediate in GCP,
    no soft-delete by default unlike Key Vault).
    Key Vault list_properties_of_secrets maps to list_secrets.
    Key Vault purge_deleted_secret has no GCP equivalent.
    Key Vault secret versioning maps to Secret Manager versions
    (access specific version with /versions/N instead of /versions/latest).
base_confidence: 0.80
tags:
  - key-vault
  - secret-manager
  - python
  - secrets
  - method-call
  - medium-complexity
examples:
  - input: |
      from azure.identity import DefaultAzureCredential
      from azure.keyvault.secrets import SecretClient

      credential = DefaultAzureCredential()
      client = SecretClient(
          vault_url="https://my-vault.vault.azure.net",
          credential=credential
      )

      # Get secret
      secret = client.get_secret("db-password")
      password = secret.value

      # Set secret
      client.set_secret("api-key", "new-api-key-value")

      # Delete secret
      poller = client.begin_delete_secret("old-secret")
      poller.result()
    output: |
      from google.cloud import secretmanager

      sm_client = secretmanager.SecretManagerServiceClient()
      project_id = "my-project"

      # Access secret
      name = f"projects/{project_id}/secrets/db-password/versions/latest"
      response = sm_client.access_secret_version(request={"name": name})
      password = response.payload.data.decode("UTF-8")

      # Create/update secret
      parent = f"projects/{project_id}"
      try:
          sm_client.create_secret(request={
              "parent": parent,
              "secret_id": "api-key",
              "secret": {"replication": {"automatic": {}}},
          })
      except Exception:
          pass
      sm_client.add_secret_version(request={
          "parent": f"{parent}/secrets/api-key",
          "payload": {"data": b"new-api-key-value"},
      })

      # Delete secret
      sm_client.delete_secret(request={
          "name": f"projects/{project_id}/secrets/old-secret"
      })
