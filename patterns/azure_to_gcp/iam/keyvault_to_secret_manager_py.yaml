id: azure-keyvault-to-secret-manager-py
name: "Azure Key Vault to GCP Secret Manager (Python)"
description: >
  Transforms azure.keyvault.secrets SecretClient operations to
  google.cloud.secretmanager SecretManagerServiceClient. Maps Key Vault
  secret CRUD operations to Secret Manager equivalents.
source_provider: azure
target_provider: gcp
source_service: key-vault
target_service: secret-manager
language: python
construct_type: client_init
match_pattern:
  imports:
    - "from azure.keyvault.secrets import SecretClient"
    - "import azure.keyvault.secrets"
  client_names:
    - "SecretClient("
  method_names:
    - "get_secret"
    - "set_secret"
    - "delete_secret"
    - "list_properties_of_secrets"
  text_patterns:
    - "SecretClient"
    - "vault_url"
    - "keyvault"
    - ".value"
transform:
  replacement_template: |
    from google.cloud import secretmanager

    sm_client = secretmanager.SecretManagerServiceClient()

    # Get secret
    secret_name = f"projects/{{project_id}}/secrets/{{secret_id}}/versions/latest"
    response = sm_client.access_secret_version(request={"name": secret_name})
    secret_value = response.payload.data.decode("UTF-8")
  import_additions:
    - "from google.cloud import secretmanager"
  import_removals:
    - "from azure.keyvault.secrets import SecretClient"
    - "from azure.identity import DefaultAzureCredential"
  notes: >
    Key Vault operations mapping:
      - get_secret(name) -> access_secret_version(name + /versions/latest)
      - set_secret(name, value) -> create_secret + add_secret_version
      - delete_secret(name) -> delete_secret (immediate, no soft-delete default)
      - list_properties_of_secrets() -> list_secrets
    Key Vault secret.value maps to response.payload.data.decode("UTF-8").
    Key Vault soft-delete and purge protection have no direct GCP equivalent.
    Key Vault access policies map to Secret Manager IAM bindings.
    Key Vault keys and certificates are separate services in GCP
    (Cloud KMS for keys, Certificate Manager for certificates).
    Key Vault vault_url maps to projects/PROJECT_ID resource path.
base_confidence: 0.85
tags:
  - key-vault
  - secret-manager
  - python
  - secrets
  - client-init
  - low-complexity
examples:
  - input: |
      from azure.identity import DefaultAzureCredential
      from azure.keyvault.secrets import SecretClient

      credential = DefaultAzureCredential()
      secret_client = SecretClient(
          vault_url="https://my-vault.vault.azure.net",
          credential=credential
      )

      # Get a secret
      secret = secret_client.get_secret("database-password")
      db_password = secret.value

      # Set a secret
      secret_client.set_secret("api-key", "my-api-key-value")

      # List secrets
      secrets = secret_client.list_properties_of_secrets()
      for secret_props in secrets:
          print(secret_props.name)
    output: |
      from google.cloud import secretmanager

      sm_client = secretmanager.SecretManagerServiceClient()
      project_id = "my-project"

      # Get a secret
      secret_name = f"projects/{project_id}/secrets/database-password/versions/latest"
      response = sm_client.access_secret_version(request={"name": secret_name})
      db_password = response.payload.data.decode("UTF-8")

      # Set a secret (create + add version)
      parent = f"projects/{project_id}"
      try:
          sm_client.create_secret(request={
              "parent": parent,
              "secret_id": "api-key",
              "secret": {"replication": {"automatic": {}}},
          })
      except Exception:
          pass  # Secret may already exist
      sm_client.add_secret_version(request={
          "parent": f"{parent}/secrets/api-key",
          "payload": {"data": b"my-api-key-value"},
      })

      # List secrets
      secrets = sm_client.list_secrets(request={"parent": parent})
      for secret in secrets:
          print(secret.name.split("/")[-1])
