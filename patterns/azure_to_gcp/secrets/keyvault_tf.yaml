id: azure-keyvault-to-secret-manager-tf
name: "Azure Key Vault to GCP Secret Manager (Terraform)"
description: >
  Transforms azurerm_key_vault and azurerm_key_vault_secret to
  google_secret_manager_secret and google_secret_manager_secret_version.
  Maps Key Vault access policies to Secret Manager IAM bindings.
source_provider: azure
target_provider: gcp
source_service: key-vault
target_service: secret-manager
language: hcl
construct_type: resource_block
match_pattern:
  resource_types:
    - "azurerm_key_vault"
    - "azurerm_key_vault_secret"
    - "azurerm_key_vault_access_policy"
  text_patterns:
    - "key_vault_id"
    - "tenant_id"
    - "sku_name"
    - "access_policy"
    - "secret_permissions"
    - "purge_protection_enabled"
    - "soft_delete_retention_days"
transform:
  replacement_template: |
    resource "google_secret_manager_secret" "{{resource_name}}" {
      secret_id = "{{secret_id}}"
      project   = var.project_id

      replication {
        auto {}
      }

      labels = {
        {{labels}}
      }
    }

    resource "google_secret_manager_secret_version" "{{version_name}}" {
      secret      = google_secret_manager_secret.{{resource_name}}.id
      secret_data = {{secret_value}}
    }
  import_additions: []
  import_removals: []
  notes: >
    Azure Key Vault is a single resource containing secrets, keys, and
    certificates; GCP uses separate services (Secret Manager, Cloud KMS,
    Certificate Manager).
    Azure azurerm_key_vault maps to the Secret Manager service (no vault
    resource needed in GCP).
    Azure azurerm_key_vault_secret maps to google_secret_manager_secret +
    google_secret_manager_secret_version.
    Azure access_policy maps to google_secret_manager_secret_iam_member.
    Azure soft_delete and purge_protection have no direct GCP equivalents.
    Azure Key Vault sku_name (standard/premium) has no GCP equivalent;
    Secret Manager pricing is per-operation.
    Azure Key Vault tenant_id is not needed in GCP (project-scoped).
    Azure Key Vault network ACLs map to VPC Service Controls in GCP.
base_confidence: 0.78
tags:
  - key-vault
  - secret-manager
  - terraform
  - secrets
  - resource-block
  - low-complexity
examples:
  - input: |
      resource "azurerm_key_vault" "main" {
        name                        = "myapp-keyvault"
        location                    = azurerm_resource_group.main.location
        resource_group_name         = azurerm_resource_group.main.name
        tenant_id                   = data.azurerm_client_config.current.tenant_id
        sku_name                    = "standard"
        soft_delete_retention_days  = 90
        purge_protection_enabled    = true

        access_policy {
          tenant_id = data.azurerm_client_config.current.tenant_id
          object_id = data.azurerm_client_config.current.object_id

          secret_permissions = ["Get", "List", "Set", "Delete"]
        }

        tags = {
          Environment = "production"
        }
      }

      resource "azurerm_key_vault_secret" "db_password" {
        name         = "db-password"
        value        = var.db_password
        key_vault_id = azurerm_key_vault.main.id
      }

      resource "azurerm_key_vault_secret" "api_key" {
        name         = "api-key"
        value        = var.api_key
        key_vault_id = azurerm_key_vault.main.id
      }
    output: |
      resource "google_secret_manager_secret" "db_password" {
        secret_id = "db-password"
        project   = var.project_id

        replication {
          auto {}
        }

        labels = {
          environment = "production"
        }
      }

      resource "google_secret_manager_secret_version" "db_password" {
        secret      = google_secret_manager_secret.db_password.id
        secret_data = var.db_password
      }

      resource "google_secret_manager_secret" "api_key" {
        secret_id = "api-key"
        project   = var.project_id

        replication {
          auto {}
        }

        labels = {
          environment = "production"
        }
      }

      resource "google_secret_manager_secret_version" "api_key" {
        secret      = google_secret_manager_secret.api_key.id
        secret_data = var.api_key
      }

      # IAM binding for secret access
      resource "google_secret_manager_secret_iam_member" "db_password_accessor" {
        secret_id = google_secret_manager_secret.db_password.secret_id
        project   = var.project_id
        role      = "roles/secretmanager.secretAccessor"
        member    = "serviceAccount:${google_service_account.app.email}"
      }
