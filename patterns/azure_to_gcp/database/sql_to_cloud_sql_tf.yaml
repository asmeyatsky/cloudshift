id: azure-sql-to-cloud-sql-tf
name: "Azure SQL Server to Cloud SQL (Terraform)"
description: >
  Transforms azurerm_mssql_server and azurerm_mssql_database to
  google_sql_database_instance and google_sql_database. Maps SKU/DTU
  settings to Cloud SQL tiers, and Azure AD auth to IAM database auth.
source_provider: azure
target_provider: gcp
source_service: azure-sql
target_service: cloud-sql
language: hcl
construct_type: resource_block
match_pattern:
  resource_types:
    - "azurerm_mssql_server"
    - "azurerm_mssql_database"
    - "azurerm_sql_server"
    - "azurerm_sql_database"
    - "azurerm_mssql_firewall_rule"
  text_patterns:
    - "sku_name"
    - "administrator_login"
    - "max_size_gb"
    - "version"
transform:
  replacement_template: |
    resource "google_sql_database_instance" "{{resource_name}}" {
      name             = "{{instance_name}}"
      database_version = "{{database_version}}"
      region           = "{{region}}"
      project          = var.project_id

      settings {
        tier              = "{{tier}}"
        availability_type = "{{availability_type}}"
        disk_size         = {{disk_size}}
        disk_type         = "PD_SSD"
        disk_autoresize   = true

        ip_configuration {
          ipv4_enabled    = false
          private_network = "{{vpc_network}}"
        }

        backup_configuration {
          enabled                        = true
          point_in_time_recovery_enabled = true
          start_time                     = "03:00"
        }
      }

      deletion_protection = true
    }

    resource "google_sql_database" "{{db_name}}" {
      name     = "{{database_name}}"
      instance = google_sql_database_instance.{{resource_name}}.name
    }

    resource "google_sql_user" "{{user_name}}" {
      name     = "{{username}}"
      instance = google_sql_database_instance.{{resource_name}}.name
      password = var.db_password
    }
  import_additions: []
  import_removals: []
  notes: >
    Azure SQL uses SQL Server engine; Cloud SQL supports SQL Server, PostgreSQL,
    and MySQL. For SQL Server specifically, use database_version = "SQLSERVER_2019_STANDARD".
    Azure SQL SKU mapping:
      - Basic/S0 (10 DTU) -> db-custom-1-3840
      - S1 (20 DTU) -> db-custom-1-3840
      - S3 (100 DTU) -> db-custom-2-7680
      - P1 (125 DTU) -> db-custom-2-13312
      - P2 (250 DTU) -> db-custom-4-26624
    Azure SQL elastic pools map to multiple Cloud SQL instances
    (Cloud SQL does not have elastic pools).
    Azure SQL firewall rules map to Cloud SQL authorized_networks or private IP.
    Azure AD authentication maps to Cloud SQL IAM database authentication.
    Consider migrating to PostgreSQL on Cloud SQL for better GCP integration.
base_confidence: 0.72
tags:
  - azure-sql
  - cloud-sql
  - terraform
  - database
  - resource-block
  - medium-complexity
examples:
  - input: |
      resource "azurerm_mssql_server" "main" {
        name                         = "myapp-sqlserver"
        resource_group_name          = azurerm_resource_group.main.name
        location                     = azurerm_resource_group.main.location
        version                      = "12.0"
        administrator_login          = "sqladmin"
        administrator_login_password = var.sql_password
        minimum_tls_version          = "1.2"

        tags = {
          Environment = "production"
        }
      }

      resource "azurerm_mssql_database" "main" {
        name      = "myapp-db"
        server_id = azurerm_mssql_server.main.id
        sku_name  = "S3"

        max_size_gb = 250

        tags = {
          Environment = "production"
        }
      }
    output: |
      resource "google_sql_database_instance" "main" {
        name             = "myapp-sqlserver"
        database_version = "SQLSERVER_2019_STANDARD"
        region           = "us-central1"
        project          = var.project_id

        settings {
          tier              = "db-custom-2-7680"
          availability_type = "REGIONAL"
          disk_size         = 250
          disk_type         = "PD_SSD"
          disk_autoresize   = true

          ip_configuration {
            ipv4_enabled    = false
            private_network = google_compute_network.main.id
          }

          backup_configuration {
            enabled                        = true
            point_in_time_recovery_enabled = true
            start_time                     = "03:00"
          }
        }

        deletion_protection = true
      }

      resource "google_sql_database" "main" {
        name     = "myapp-db"
        instance = google_sql_database_instance.main.name
      }

      resource "google_sql_user" "admin" {
        name     = "sqladmin"
        instance = google_sql_database_instance.main.name
        password = var.sql_password
      }
