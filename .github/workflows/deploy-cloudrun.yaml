# Build CloudShift image with Docker on the runner and deploy to Google Cloud Run.
# No Cloud Build; only Artifact Registry + Cloud Run permissions needed.
#
# Required GitHub secrets:
#   GCP_SA_KEY: JSON key for a service account in the deploy project (emea-mas) with:
#     - Artifact Registry Writer, Cloud Run Admin, Service Account User
#   GEMINI_API_KEY: Google Gemini API key for demo mode (refactor LLM)
# Optional:
#   CLOUDSHIFT_API_KEY: if set, enables searce_id auth and API key for VS Code / scripts
# See docs/deploy-emea-mas.md for SA setup.
name: Build and Deploy to Cloud Run

on:
  push:
    branches:
      - main
      - master

env:
  GCP_PROJECT_ID: emea-mas
  GCP_REGION: us-central1
  CLOUD_RUN_SERVICE: cloudshift
  ARTIFACT_REGISTRY: us-central1-docker.pkg.dev

jobs:
  build-and-deploy:
    name: Build image and deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: Configure Docker for Artifact Registry
        run: |
          gcloud auth configure-docker ${{ env.ARTIFACT_REGISTRY }} --quiet

      - name: Build and push image
        id: build
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          IMAGE_TAG="sha-${SHORT_SHA}"
          IMAGE="${{ env.ARTIFACT_REGISTRY }}/${{ env.GCP_PROJECT_ID }}/cloudshift/cloudshift:${IMAGE_TAG}"
          echo "IMAGE=${IMAGE}" >> $GITHUB_OUTPUT
          echo "IMAGE_TAG=${IMAGE_TAG}" >> $GITHUB_OUTPUT
          docker build -t "${IMAGE}" -f docker/Dockerfile .
          docker push "${IMAGE}"

      # max-instances=1 so plan/scan/apply job results (in-memory + SQLite) are visible to polling GETs
      - name: Deploy to Cloud Run
        run: |
          IMAGE_TAG="${{ steps.build.outputs.IMAGE_TAG }}"
          IMAGE="${{ env.ARTIFACT_REGISTRY }}/${{ env.GCP_PROJECT_ID }}/cloudshift/cloudshift:${IMAGE_TAG}"
          ENV_VARS="CLOUDSHIFT_LLM_ENABLED=false"
          if [ -n "${{ secrets.GEMINI_API_KEY }}" ]; then
            ENV_VARS="CLOUDSHIFT_DEPLOYMENT_MODE=demo,CLOUDSHIFT_GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }},${ENV_VARS}"
          fi
          if [ -n "${{ secrets.CLOUDSHIFT_API_KEY }}" ]; then
            ENV_VARS="CLOUDSHIFT_AUTH_MODE=searce_id,CLOUDSHIFT_API_KEY=${{ secrets.CLOUDSHIFT_API_KEY }},${ENV_VARS}"
          fi
          gcloud run deploy ${{ env.CLOUD_RUN_SERVICE }} \
            --image="${IMAGE}" \
            --region=${{ env.GCP_REGION }} \
            --platform=managed \
            --set-env-vars="${ENV_VARS}" \
            --allow-unauthenticated \
            --max-instances=1 \
            --project=${{ env.GCP_PROJECT_ID }}

      - name: Send 100% traffic to latest revision
        run: |
          gcloud run services update-traffic ${{ env.CLOUD_RUN_SERVICE }} \
            --to-latest \
            --region=${{ env.GCP_REGION }} \
            --project=${{ env.GCP_PROJECT_ID }}

      - name: Output service URL
        run: |
          URL=$(gcloud run services describe ${{ env.CLOUD_RUN_SERVICE }} \
            --region=${{ env.GCP_REGION }} \
            --format='value(status.url)' \
            --project=${{ env.GCP_PROJECT_ID }})
          echo "Cloud Run service URL: ${URL}"
