# Build CloudShift image with Docker on the runner and deploy to Google Cloud Run.
# No Cloud Build; only Artifact Registry + Cloud Run permissions needed.
#
# Required GitHub secrets:
#   GCP_SA_KEY: JSON key for a service account in the deploy project (emea-mas) with:
#     - Artifact Registry Writer, Cloud Run Admin, Service Account User
#   GEMINI_API_KEY: Google Gemini API key for demo mode (refactor LLM)
# Optional:
#   CLOUDSHIFT_API_KEY: if set, enables searce_id auth and API key for VS Code / scripts
# See docs/deploy-emea-mas.md for SA setup.
name: Build and Deploy to Cloud Run

on:
  push:
    branches:
      - main
      - master

env:
  GCP_PROJECT_ID: emea-mas
  GCP_REGION: us-central1
  CLOUD_RUN_SERVICE: cloudshift
  ARTIFACT_REGISTRY: us-central1-docker.pkg.dev

jobs:
  build-and-deploy:
    name: Build image and deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: Configure Docker for Artifact Registry
        run: |
          gcloud auth configure-docker ${{ env.ARTIFACT_REGISTRY }} --quiet

      - name: Build and push image
        id: build
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          IMAGE_TAG="sha-${SHORT_SHA}"
          IMAGE="${{ env.ARTIFACT_REGISTRY }}/${{ env.GCP_PROJECT_ID }}/cloudshift/cloudshift:${IMAGE_TAG}"
          echo "IMAGE=${IMAGE}" >> $GITHUB_OUTPUT
          echo "IMAGE_TAG=${IMAGE_TAG}" >> $GITHUB_OUTPUT
          docker build -t "${IMAGE}" -f docker/Dockerfile .
          docker push "${IMAGE}"

      # Require GEMINI_API_KEY so refactor never returns 503 (no-LLM)
      - name: Check required secrets
        run: |
          if [ -z "${{ secrets.GEMINI_API_KEY }}" ]; then
            echo "::error::GEMINI_API_KEY secret is not set. Refactor will return 503. Add it in repo Settings → Secrets → Actions."
            exit 1
          fi
          echo "GEMINI_API_KEY is set."

      # Use env file (YAML) so API keys with commas/special chars are not mangled by comma-separated --set-env-vars
      - name: Deploy to Cloud Run
        run: |
          IMAGE_TAG="${{ steps.build.outputs.IMAGE_TAG }}"
          IMAGE="${{ env.ARTIFACT_REGISTRY }}/${{ env.GCP_PROJECT_ID }}/cloudshift/cloudshift:${IMAGE_TAG}"
          ENV_FILE=$(mktemp).yaml
          {
            echo "CLOUDSHIFT_LLM_ENABLED: \"false\""
            echo "CLOUDSHIFT_DEPLOYMENT_MODE: \"demo\""
            echo "CLOUDSHIFT_GEMINI_API_KEY: \"${{ secrets.GEMINI_API_KEY }}\""
            if [ -n "${{ secrets.CLOUDSHIFT_API_KEY }}" ]; then
              echo "CLOUDSHIFT_AUTH_MODE: \"searce_id\""
              echo "CLOUDSHIFT_API_KEY: \"${{ secrets.CLOUDSHIFT_API_KEY }}\""
            fi
          } > "$ENV_FILE"
          gcloud run deploy ${{ env.CLOUD_RUN_SERVICE }} \
            --image="${IMAGE}" \
            --region=${{ env.GCP_REGION }} \
            --platform=managed \
            --env-vars-file="${ENV_FILE}" \
            --allow-unauthenticated \
            --max-instances=1 \
            --project=${{ env.GCP_PROJECT_ID }}
          rm -f "$ENV_FILE"

      - name: Send 100% traffic to latest revision
        run: |
          gcloud run services update-traffic ${{ env.CLOUD_RUN_SERVICE }} \
            --to-latest \
            --region=${{ env.GCP_REGION }} \
            --project=${{ env.GCP_PROJECT_ID }}

      - name: Output service URL
        run: |
          URL=$(gcloud run services describe ${{ env.CLOUD_RUN_SERVICE }} \
            --region=${{ env.GCP_REGION }} \
            --format='value(status.url)' \
            --project=${{ env.GCP_PROJECT_ID }})
          echo "Cloud Run service URL: ${URL}"
