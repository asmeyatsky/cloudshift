apiVersion: v1
kind: Service
metadata:
  name: {{ include "cloudshift.fullname" . }}-api
  labels:
    {{- include "cloudshift.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "cloudshift.api.selectorLabels" . | nindent 4 }}
