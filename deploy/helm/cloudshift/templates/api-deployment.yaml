apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "cloudshift.fullname" . }}-api
  labels:
    {{- include "cloudshift.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  replicas: {{ .Values.api.replicas }}
  selector:
    matchLabels:
      {{- include "cloudshift.api.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "cloudshift.api.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "cloudshift.serviceAccountName" . }}
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: api
          image: {{ include "cloudshift.image" (dict "global" .Values.global "image" .Values.api.image) }}
          imagePullPolicy: {{ .Values.api.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.api.port }}
              protocol: TCP
          env:
            {{- range $key, $val := .Values.api.env }}
            - name: {{ $key }}
              value: {{ $val | quote }}
            {{- end }}
            - name: CLOUDSHIFT_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.api.secretName }}
                  key: api-key
                  optional: true
          {{- with .Values.api.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.api.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /app/data
      volumes:
        - name: data
          {{- if .Values.api.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "cloudshift.fullname" . }}-data
          {{- else }}
          emptyDir: {}
          {{- end }}
